<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUFF — Freedom &amp; Confort</title>
<meta name="description" content="CLUFF — Freedom &amp; Confort. Atacado, varejo e revenda.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --marinho:#152532;
    --creme:#f8efd0;
    --creme-escuro:#ede1b8;
    --cinza:#7d7568;
    --shopee:#EE4D2D;
    --whats:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Quicksand',sans-serif;
    background:var(--creme);
    color:var(--marinho);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .page{
    width:100%;
    max-width:430px;
    padding:16px 22px 26px;
    display:flex;
    flex-direction:column;
  }

  /* ===== HERO — banner de campanha ===== */
  .hero{
    position:relative;
    height:190px;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 6px 24px rgba(21,37,50,.14);
  }
  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 48%;
    display:block;
    filter:blur(1.5px) brightness(.88);
    transform:scale(1.04);
  }
  .hero .marca{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .hero .marca .logomarca{
    width:150px;
    height:auto;
    filter:drop-shadow(0 2px 10px rgba(21,37,50,.5));
  }
  .hero .marca p{
    font-weight:500;
    font-size:12px;
    letter-spacing:.3em;
    text-indent:.3em;
    text-transform:uppercase;
    color:rgba(255,255,255,.95);
    margin-top:4px;
    text-shadow:0 1px 8px rgba(21,37,50,.5);
  }

  /* ===== Rótulos ===== */
  .rotulo{
    font-weight:600;
    font-size:11px;
    letter-spacing:.28em;
    text-indent:.28em;
    text-transform:uppercase;
    color:var(--marinho);
    text-align:center;
    margin:24px 0 12px;
  }

  /* ===== Botões ===== */
  .botao{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:15px 18px;
    margin-bottom:10px;
    text-decoration:none;
    font-size:13px;
    font-weight:600;
    letter-spacing:.14em;
    text-indent:.14em;
    text-transform:uppercase;
    border-radius:999px;
    transition:background .25s,color .25s,border-color .25s,transform .15s;
  }
  .botao:active{transform:scale(.98)}
  .botao svg{width:17px;height:17px;flex-shrink:0}

  /* Atacado — marinho da logo */
  .botao.marinho{
    background:var(--marinho);
    color:var(--creme);
    border:2px solid var(--marinho);
  }
  .botao.marinho:hover{
    background:var(--whats);
    border-color:var(--whats);
    color:#ffffff;
  }

  /* Varejo — contornado, hover laranja Shopee */
  .botao.contorno{
    background:transparent;
    color:var(--marinho);
    border:2px solid var(--marinho);
  }
  .botao.contorno:hover{
    background:var(--shopee);
    border-color:var(--shopee);
    color:#ffffff;
  }

  /* ===== Rodapé revendedoras ===== */
  .revenda{
    margin-top:auto;
    padding-top:24px;
    border-top:2px dashed var(--creme-escuro);
    text-align:center;
  }
  .revenda a{
    text-decoration:none;
    color:var(--marinho);
    display:inline-block;
    transition:color .25s;
  }
  .revenda a strong{
    display:block;
    font-weight:700;
    font-size:13px;
    letter-spacing:.18em;
    text-indent:.18em;
    text-transform:uppercase;
  }
  .revenda a span{
    display:block;
    font-weight:500;
    font-size:12px;
    letter-spacing:.04em;
    color:var(--cinza);
    margin-top:5px;
    transition:color .25s;
  }
  .revenda a:hover,
  .revenda a:hover span{color:var(--whats)}

  .assinatura{
    margin-top:18px;
    text-align:center;
    font-weight:500;
    font-size:9px;
    letter-spacing:.28em;
    text-indent:.28em;
    text-transform:uppercase;
    color:#b6ac99;
  }

  @media (prefers-reduced-motion:reduce){
    .botao,.revenda a,.revenda a span{transition:none}
  }
</style>
</head>
